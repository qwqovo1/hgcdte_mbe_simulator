<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBE数字孪生 - 移动端访问</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 20px; color: #333; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.98); }
        .tip {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #856404;
            margin-top: 16px;
        }
        .url { 
            word-break: break-all; 
            font-family: monospace; 
            font-size: 12px;
            color: #999;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔬</div>
        <h1>MBE 数字孪生系统</h1>
        <p>电子束外延实验数据分析与AI智能诊断平台</p>

        <a class="btn" href="http://172.31.147.241:5173" id="openBtn">
            🚀 点击进入系统
        </a>

        <div class="tip" id="wechatTip" style="display:none;">
            💡 <strong>微信用户提示：</strong><br>
            请点击右上角 ⋯ 选择「在浏览器中打开」<br>
            以获得最佳体验
        </div>

        <div class="url">http://172.31.147.241:5173</div>
    </div>

    <script>
        // 检测微信环境
        if (/MicroMessenger/i.test(navigator.userAgent)) {
            document.getElementById('wechatTip').style.display = 'block';
        }

        // 自动跳转（非微信环境）
        if (!/MicroMessenger/i.test(navigator.userAgent)) {
            window.location.href = "http://172.31.147.241:5173";
        }
    </script>
</body>
</html>
